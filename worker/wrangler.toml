name = "sf-api-version-updater"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# OAuth is handled by the sf-oauth-broker worker (separate project/deployment).
# This worker only proxies Salesforce Metadata/Tooling API calls.

[vars]
# Comma-separated list of allowed origins for CORS.
# All localhost origins are allowed automatically for local development.
ALLOWED_ORIGINS = "https://alphacloudsf.github.io"
